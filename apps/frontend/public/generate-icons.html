<!DOCTYPE html>
<html>
<head>
  <title>TrainerApp Icon Generator</title>
  <style>
    body { font-family: sans-serif; background: #1a1a2e; color: white; padding: 40px; }
    button { background: #ff4b6e; color: white; border: none; padding: 12px 24px;
             border-radius: 8px; font-size: 16px; cursor: pointer; margin: 8px; }
    canvas { display: block; margin: 20px 0; border-radius: 12px; }
    .preview { display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-end; }
    h2 { color: #ff4b6e; margin-top: 32px; }
  </style>
</head>
<body>
  <h1>💪 TrainerApp Icon Generator</h1>
  <p>Generates standard icons + maskable variants with safe-zone padding.</p>

  <h2>Standard icons</h2>
  <div class="preview" id="preview-standard"></div>
  <button onclick="downloadStandard()">Download Standard Icons</button>

  <h2>Maskable icons (safe zone — subject stays within center 80%)</h2>
  <div class="preview" id="preview-maskable"></div>
  <button onclick="downloadMaskable()">Download Maskable Icons</button>

  <br><br>
  <button onclick="downloadAll()">Download All</button>

  <script>
    const SIZES    = [72, 96, 128, 144, 152, 192, 384, 512]
    const MASKABLE = [192, 512]
    const BG       = '#1a1a2e'
    const EMOJI    = '💪'

    // Standard: emoji fills ~68% of icon
    function drawIcon(size, safeFraction = 0.68) {
      const canvas = document.createElement('canvas')
      canvas.width  = size
      canvas.height = size
      const ctx = canvas.getContext('2d')

      ctx.fillStyle = BG
      ctx.fillRect(0, 0, size, size)

      const fontSize = Math.floor(size * safeFraction)
      ctx.font          = `${fontSize}px serif`
      ctx.textAlign     = 'center'
      ctx.textBaseline  = 'middle'
      ctx.fillText(EMOJI, size / 2, size / 2 + fontSize * 0.05)

      return canvas
    }

    // Maskable: emoji confined to center 80% safe zone → use ~54% of total size
    function drawMaskable(size) {
      return drawIcon(size, 0.54)
    }

    function download(canvas, filename) {
      const link = document.createElement('a')
      link.download = filename
      link.href     = canvas.toDataURL('image/png')
      link.click()
    }

    function downloadStandard() {
      SIZES.forEach(s => download(drawIcon(s), `icon-${s}x${s}.png`))
    }

    function downloadMaskable() {
      MASKABLE.forEach(s => download(drawMaskable(s), `icon-${s}x${s}-maskable.png`))
    }

    function downloadAll() {
      downloadStandard()
      downloadMaskable()
    }

    // Previews
    function addPreview(containerId, sizes, drawFn, suffix = '') {
      const container = document.getElementById(containerId)
      sizes.forEach(size => {
        const canvas = drawFn(size)
        canvas.title = `${size}x${size}${suffix}`
        const wrap = document.createElement('div')
        wrap.style.textAlign = 'center'
        wrap.innerHTML = `<div style="font-size:12px;color:#888">${size}x${size}${suffix}</div>`
        wrap.prepend(canvas)
        container.appendChild(wrap)
      })
    }

    addPreview('preview-standard', [72, 192, 512], drawIcon)
    addPreview('preview-maskable', MASKABLE, drawMaskable, ' maskable')
  </script>
</body>
</html>
